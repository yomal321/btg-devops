name-template: 'btg-devops $NEXT_PATCH_VERSION'
tag-template: 'v$NEXT_PATCH_VERSION'

categories:
  - title: '🚀 New Features'
    labels:
      - 'feature'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bugfix'
  - title: '🧹 Maintenance'
    labels:
      - 'chore'
  - title: '📝 Documentation'
    labels:
      - 'docs'
  - title: '⚙️ CI / CD'
    labels:
      - 'ci'
  - title: '🔀 Other Changes'
    labels:
      - 'other'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  default: patch

template: |
  ## What's Changed

  $CHANGES
