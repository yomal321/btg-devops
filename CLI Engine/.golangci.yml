run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - revive

linters-settings:
  revive:
    rules:
      - name: unused-parameter
        severity: warning
        disabled: false
      - name: var-naming
        severity: warning
        disabled: false
      - name: error-strings
        severity: warning
        disabled: false
      - name: redefines-builtin-id
        severity: warning
        disabled: false
